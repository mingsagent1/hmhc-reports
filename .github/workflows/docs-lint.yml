name: Docs consistency lint

# Fails the PR when the pipeline docs drift from reality:
#  1. every repo path referenced by meta.json lineage, UPDATE.md, or a
#     relative markdown link must exist on disk;
#  2. data/tables.md must be exactly reproducible from the reconciled
#     ledger by the deterministic Build-Tables script.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Referenced paths exist
        run: python3 .github/scripts/docs_lint.py
      - name: Tables reproducible from ledger
        run: python3 pipeline/sg-banks/method/code/build_tables.py --check
      - name: Charts reproducible from ledger
        run: python3 pipeline/sg-banks/method/code/build_charts.py --check
      - name: Benchmarks reproducible from inputs
        run: python3 pipeline/sg-banks/method/code/build_benchmarks.py --check
      - name: Health metrics reproducible from inputs
        run: python3 pipeline/sg-banks/method/code/build_health.py --check
      - name: Gaps worklist reproducible from inputs
        run: python3 pipeline/sg-banks/method/code/build_gaps.py --check
